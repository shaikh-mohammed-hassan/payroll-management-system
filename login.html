<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Payroll Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h1>Payroll Management System</h1>
            
            <!-- Login Form -->
            <div id="loginForm" class="form-container active">
               
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter password" required>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="radio" name="userType" value="user" checked> User
                            <input type="radio" name="userType" value="admin"> Admin
                        </label>
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                </form>
                <p class="toggle-text">Don't have account? <a href="#" onclick="toggleForm()">Create New Account</a></p>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="form-container">
                <h2>Create New Account</h2>
                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="signupName" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signupEmail" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" placeholder="Create password" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="signupConfirm" placeholder="Confirm password" required>
                    </div>
                    <button type="submit" class="btn-primary">Create Account</button>
                </form>
                <p class="toggle-text">Already have account? <a href="#" onclick="toggleForm()">Login Here</a></p>
            </div>

            <div id="demoCreds" class="demo-credentials">
                <p><strong>Demo Credentials:</strong></p>
                <p>Admin: admin@payroll.com | Pass: admin123</p>
                <p>User: user@payroll.com | Pass: user123</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
